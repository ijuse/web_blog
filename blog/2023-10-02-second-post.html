<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二篇文章 - 我的个人博客</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/images.css">
    <link rel="stylesheet" href="../css/markdown.css">
</head>
<body>
    <header>
        <h1>我的个人博客</h1>
        <nav>
            <ul>
                <li><a href="../index.html">首页</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article class="markdown-content">
            <h2>第二篇文章</h2>
            <p>发布日期: 2023-10-02</p>
            <div id="markdown-content">
# 第二篇文章

这是我的第二篇博客文章。

继续探索更多内容！
            </div>
        </article>
    </main>
    <footer>
        <p>&copy; 2023 我的博客. 保留所有权利.</p>
    </footer>

    <script src="../js/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('markdown-content');
            content.innerHTML = marked.parse(content.textContent);
            if (window.initMarkdownEnhance) window.initMarkdownEnhance('#markdown-content');
        });
    </script>

    <!-- 全站图片增强脚本（用于 caption 与点击放大） -->
    <script src="../js/add-image-effects.js"></script>
    <!-- Markdown 增强（样式 + 复制按钮） -->
    <script src="../js/markdown-enhance.js"></script>
</body>
</html>
